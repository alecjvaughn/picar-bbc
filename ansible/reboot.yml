---
- name: Reboot and Poll System Health
  hosts: "{{ target_hosts | default('picar') }}"
  become: true
  gather_facts: false

  tasks:
    - name: Reboot the host
      ansible.builtin.reboot:
        msg: "Reboot initiated by Ansible"
        connect_timeout: 5
        reboot_timeout: 600
        pre_reboot_delay: 0
        post_reboot_delay: 30
        test_command: whoami

    - name: Verify Docker Service is Active
      ansible.builtin.systemd:
        name: docker
        state: started
      register: docker_status
      until: docker_status.status.ActiveState == "active"
      retries: 12
      delay: 5

    - name: Verify Picar Server Container is Running
      ansible.builtin.command: docker inspect -f '{{ "{{" }}.State.Status{{ "}}" }}' picar-server
      register: container_status
      changed_when: false
      failed_when: container_status.stdout != 'running'
      ignore_errors: yes

    - name: Display Health Status
      ansible.builtin.debug:
        msg:
          - "System: Online"
          - "Docker: {{ docker_status.status.ActiveState }}"
          - "Picar Server: {{ container_status.stdout }}"
      failed_when: container_status.stdout != 'running'