---
- name: Run Hardware Component Test
  hosts: all
  become: yes
  vars:
    component: "Led"
    server_image: "local/picar-server:latest"
    container_name: "picar-server"
    test_duration: "60s"
    project_dir: "/home/{{ ansible_user }}/picar-bbc"

  tasks:
    - name: Stop running server to free hardware resources
      command: docker stop {{ container_name }}
      ignore_errors: yes
      changed_when: false

    - name: Cleanup previous Camera Test Output
      file:
        path: /tmp/test_camera.jpg
        state: absent
      when: component == "Camera" or component == "Non-Motor-All"

    - name: Execute hardware test
      # Use timeout to handle infinite loops in sensor tests (Ultrasonic, Infrared, etc.)
      # Sends SIGINT (2) to allow python to catch KeyboardInterrupt and cleanup.
      command: >
        timeout --signal=2 {{ test_duration }}
        make docker-run-test COMPONENT={{ component }}
      args:
        chdir: "{{ project_dir }}"
      register: test_out
      # Return code 124 means timeout occurred (expected for sensors), 0 means success
      failed_when: test_out.rc != 0 and test_out.rc != 124

    - name: Verify Camera Test Output
      stat:
        path: /tmp/test_camera.jpg
      register: camera_file
      when: component == "Camera" or component == "Non-Motor-All"

    - name: Fail if Camera file missing
      fail:
        msg: "Camera test failed: /tmp/test_camera.jpg was not created."
      when: (component == "Camera" or component == "Non-Motor-All") and not camera_file.stat.exists

    - name: Display test output
      debug:
        msg: "{{ test_out.stdout_lines }}"

    - name: Restart Picar Server
      community.general.make:
        chdir: "{{ project_dir }}"
        target: docker-run-server
      when: restart | default(false) | bool
      ignore_errors: yes