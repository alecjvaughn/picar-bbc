---
- name: Provision Raspberry Pi (System & Hardware)
  hosts: "{{ target_hosts | default('picar') }}"
  become: true

  tasks:
    - name: Update apt cache and upgrade packages
      apt:
        update_cache: yes
        upgrade: dist
        cache_valid_time: 3600

    - name: Check if a reboot is required after system upgrade
      stat:
        path: /var/run/reboot-required
      register: reboot_required_file

    - name: Trigger reboot if required by system upgrade
      command: /bin/true
      notify: Reboot Pi
      when: reboot_required_file.stat.exists

    - name: Install system dependencies
      apt:
        name:
          - git
          - make
          - curl
          - gnupg
          - docker-compose-plugin
          - i2c-tools
          # rpicam-apps is needed for the rpicam-hello hardware check
          - rpicam-apps
        state: present

    - name: Log all camera-related package versions for debugging
      shell: dpkg -l | grep -E "libcamera|rpicam|picamera2" || true
      register: camera_package_versions
      changed_when: false
      check_mode: no

    - name: Display camera package versions
      debug:
        msg: "{{ camera_package_versions.stdout_lines }}"

    - name: Install Docker
      shell: curl -fsSL https://get.docker.com | sh
      args:
        creates: /usr/bin/docker

    - name: Add user to docker group
      user:
        name: "{{ ansible_user }}"
        groups: docker
        append: yes

    - name: Reset connection to apply group changes
      meta: reset_connection

    - name: Configure Raspberry Pi Interfaces
      include_tasks: configure_pi.yml
      ignore_errors: yes

    - name: Verify rpicam software installation
      command: rpicam-hello --version
      register: rpicam_version_check
      changed_when: false
      failed_when: false # We will handle failure manually in the next task

    - name: Fail if rpicam tools are not installed correctly
      fail:
        msg: "rpicam verification failed. 'rpicam-hello --version' did not execute successfully. Please check OS compatibility (Debian Bookworm 64-bit) and ensure 'rpicam-apps' is installed."
      when: rpicam_version_check.rc != 0

    - name: Verify camera hardware is detected
      command: rpicam-hello --list-cameras
      register: camera_detection_check
      changed_when: false
      failed_when: false # We will handle failure manually in the next task

    - name: Fail if no camera hardware is detected
      fail:
        msg: "Camera hardware not detected. 'rpicam-hello --list-cameras' reported no available cameras. Please check the camera connection and ensure it is enabled in raspi-config or /boot/firmware/config.txt."
      when: camera_detection_check.rc != 0 or 'No cameras available!' in camera_detection_check.stdout

  handlers:
    - name: Reboot Pi
      reboot:
        msg: "Rebooting to apply hardware configurations"
        connect_timeout: 5
        reboot_timeout: 600
        pre_reboot_delay: 0
        post_reboot_delay: 30
        test_command: whoami