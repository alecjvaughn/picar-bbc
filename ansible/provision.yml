---
- name: Provision Raspberry Pi (System & Hardware)
  hosts: "{{ target_hosts | default('picar') }}"
  become: true

  tasks:
    - name: Update apt cache and upgrade packages
      apt:
        update_cache: yes
        upgrade: dist
        cache_valid_time: 3600

    # --- PHASE 1: PACKAGE & SYSTEM SETUP ---
    - name: Check if a reboot is required after system upgrade
      stat:
        path: /var/run/reboot-required
      register: reboot_required_file

    - name: Trigger reboot if required by system upgrade
      command: /bin/true
      notify: Reboot Pi
      when: reboot_required_file.stat.exists

    - name: Install System and Docker Prerequisites
      apt:
        name:
          - git
          - make
          - ca-certificates
          - curl
          - gnupg
          - i2c-tools
          - rpicam-apps
        state: present

    - name: Add Docker's official GPG key
      apt_key:
        url: https://download.docker.com/linux/debian/gpg
        state: present

    - name: Set up Docker repository
      apt_repository:
        repo: "deb [arch=arm64] https://download.docker.com/linux/debian {{ ansible_distribution_release }} stable"
        state: present

    - name: Install Docker Engine and plugins
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        update_cache: yes

    # --- PHASE 2: USER & GROUP MANAGEMENT ---
    - name: Add user to docker group
      user:
        name: "{{ ansible_user }}"
        groups: docker
        append: yes

    - name: Reset connection to apply group changes
      meta: reset_connection

    # --- PHASE 3: HARDWARE CONFIGURATION ---
    - name: Configure Raspberry Pi Interfaces
      include_tasks: configure_pi.yml
      # This will notify the 'Reboot Pi' handler if changes are made.

    # --- PHASE 4: APPLY CONFIGURATION (REBOOT IF NEEDED) ---
    - name: Apply all pending configuration changes (reboots if necessary)
      meta: flush_handlers

    # --- PHASE 5: VERIFICATION ---
    - name: Verify I2C devices (PCA9685 and ADC) are present
      shell: i2cdetect -y 1
      register: i2c_scan
      changed_when: false
      failed_when: "'40' not in i2c_scan.stdout or '48' not in i2c_scan.stdout"
      # This check ensures the motor controller (0x40) and ADC (0x48) are visible on the bus.

    - name: Verify rpicam software installation
      command: rpicam-hello --version
      changed_when: false
      # This simple command confirms the toolchain is installed and executable.

    - name: Verify camera hardware is detected
      command: rpicam-hello --list-cameras
      register: camera_detection_check
      changed_when: false
      failed_when: "'No cameras available!' in camera_detection_check.stdout"
      # This check ensures the OS can see the physical camera module.

  handlers:
    - name: Reboot Pi
      reboot:
        msg: "Rebooting to apply system/hardware configurations"
        connect_timeout: 5
        reboot_timeout: 600
        pre_reboot_delay: 0
        post_reboot_delay: 30
        test_command: whoami