---
- name: Deploy Picar Application
  hosts: "{{ target_hosts | default('picar') }}"
  become: true
  vars:
    repo_url: "https://github.com/your-username/picar-bbc.git"
    project_dir: "/home/{{ ansible_user }}/picar-bbc"
    tunnel_token: "{{ lookup('env', 'CLOUDFLARED_TUNNEL_TOKEN') | default('') }}"

  tasks:
    - name: Clone Project Repository
      git:
        repo: "{{ repo_url }}"
        dest: "{{ project_dir }}"
        version: "{{ branch | default('main') }}"
        force: yes
      become: false
      ignore_errors: no

    - name: Ensure project directory exists
      file:
        path: "{{ project_dir }}"
        state: directory
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"

    - name: Nuke existing Docker images and BuildKit cache (if requested)
      community.general.make:
        chdir: "{{ project_dir }}"
        target: docker-clean
      become: false
      when: force_clean | default(false) | bool

    - name: Record Build Start Time
      debug:
        msg: "Starting Docker build at {{ lookup('pipe', 'date') }}. This may take up to 1 hour on a fresh Pi..."

    - name: Build and Run Server (Docker)
      community.general.make:
        chdir: "{{ project_dir }}"
        target: docker-run-server
        params:
          BUILD_ARGS: "{{ build_args | default('') }} --progress=plain"
      become: false
      async: 3600
      poll: 0
      register: docker_build_async

    - name: Record Build Job ID
      debug:
        msg: "Build running in background (Job ID: {{ docker_build_async.ansible_job_id }}). Polling every 10s..."

    - name: Wait for Docker build to complete (Countdown = Minutes left x 6)
      async_status:
        jid: "{{ docker_build_async.ansible_job_id }}"
      become: false
      register: docker_build_out
      until: docker_build_out.finished
      retries: 360
      delay: 10

    - name: Save build log on failure
      copy:
        content: "{{ docker_build_out.stderr }}"
        dest: "./logs/docker_build_error-{{ lookup('pipe', 'date +%Y%m%d-%H%M%S') }}.log"
      delegate_to: localhost
      when: docker_build_out.failed

    - name: Record Build End Time
      debug:
        msg: "Docker build completed at {{ lookup('pipe', 'date') }}."

    - name: Verify Server Container is Running
      command: docker inspect -f '{{ "{{" }}.State.Status{{ "}}" }}' picar-server
      register: container_status
      until: container_status.stdout == "running"
      retries: 5
      delay: 2

    - name: Verify API is responsive and hardware is online
      uri:
        url: "http://localhost:5001/api/status"
        method: GET
        return_content: yes
      register: api_status
      until: api_status.status == 200 and api_status.json.hardware == "online"
      retries: 10
      delay: 3
      ignore_errors: yes 

    - name: Build and Run Tunnel (Docker)
      community.general.make:
        chdir: "{{ project_dir }}"
        target: docker-run-tunnel
      become: false
      environment:
        CLOUDFLARED_TUNNEL_TOKEN: "{{ tunnel_token }}"
      when: tunnel_token | length > 0
      async: 300
      poll: 0
      register: docker_tunnel_async

    - name: Wait for tunnel creation to complete
      async_status:
        jid: "{{ docker_tunnel_async.ansible_job_id }}"
      become: false
      register: docker_tunnel_out
      until: docker_tunnel_out.finished
      retries: 30 # 30 * 10s = 5 minutes
      delay: 10
      when: tunnel_token | length > 0 and docker_tunnel_async.ansible_job_id is defined

    - name: Save tunnel log on failure
      copy:
        content: "{{ docker_tunnel_out.stderr }}"
        dest: "./logs/docker_tunnel_error-{{ lookup('pipe', 'date +%Y%m%d-%H%M%S') }}.log"
      delegate_to: localhost
      when: tunnel_token | length > 0 and docker_tunnel_out.failed

    - name: Verify Tunnel Container is Running
      command: docker inspect -f '{{ "{{" }}.State.Status{{ "}}" }}' picar-tunnel
      register: tunnel_container_status
      until: tunnel_container_status.stdout == "running"
      retries: 5
      delay: 2
      when: tunnel_token | length > 0